name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            binary: seeu_desktop.exe

          - name: Windows ARM64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
            binary: seeu_desktop.exe

          # ── Linux ────────────────────────────────────────
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            binary: seeu_desktop

          # NOTE: ubuntu-24.04-arm 需要 GitHub Free (公开仓库) 或 GitHub Team (私有仓库)。
          # 如果该 runner 不可用，可改为 ubuntu-latest 并添加交叉编译工具链，
          # 或使用 cross 工具: cargo install cross --locked && cross build --release --target aarch64-unknown-linux-gnu
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            binary: seeu_desktop

          # ── macOS ────────────────────────────────────────
          # macOS Intel runner 已弃用，在 ARM runner 上交叉编译 x86_64
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            binary: seeu_desktop

          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary: seeu_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── 平台依赖安装 ──────────────────────────────────

      # Linux builds use containerized build for glibc 2.28 compatibility
      # See "Build (Linux)" step below

      # ── 缓存 ──────────────────────────────────────────

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # ── 构建 ──────────────────────────────────────────

      - name: Build (macOS x86_64 cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          CFLAGS: -arch x86_64
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux x86_64 with glibc 2.28)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: addnab/docker-run-action@v3
        with:
          image: quay.io/pypa/manylinux_2_28_x86_64
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source $HOME/.cargo/env

            yum install -y sqlite-devel libxcb-devel libxkbcommon-devel \
              mesa-libGL-devel mesa-libEGL-devel wayland-devel fontconfig-devel freetype-devel \
              clang-devel perl-core perl-IPC-Cmd

            cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build (Linux ARM64 with glibc 2.28)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: addnab/docker-run-action@v3
        with:
          image: quay.io/pypa/manylinux_2_28_aarch64
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
            source $HOME/.cargo/env

            yum install -y sqlite-devel libxcb-devel libxkbcommon-devel \
              mesa-libGL-devel mesa-libEGL-devel wayland-devel fontconfig-devel freetype-devel \
              clang-devel perl-core perl-IPC-Cmd glibc-static

            cargo build --release --target aarch64-unknown-linux-gnu

      - name: Build (Windows / macOS ARM64)
        if: matrix.target != 'x86_64-apple-darwin' && matrix.target != 'x86_64-unknown-linux-gnu' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      # ── 打包 ──────────────────────────────────────────

      - name: Prepare distribution directory
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          if [ -d "assets" ]; then
            cp -r assets dist/
          fi

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "SeeU-Desktop-${{ github.ref_name }}-${{ matrix.platform }}.zip"
          Compress-Archive -Path dist\* -DestinationPath $archive
          Write-Host "Created $archive"

      - name: "Create archive (macOS / Linux)"
        if: "${{ runner.os != 'Windows' }}"
        shell: bash
        run: |
          archive="SeeU-Desktop-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz"
          tar czf "$archive" -C dist .
          echo "Created $archive"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeeU-Desktop-${{ matrix.platform }}
          retention-days: 7
          if-no-files-found: error
          path: |
            *.zip
            *.tar.gz

  # ── 发布 Release ────────────────────────────────────

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          echo "## Release Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for f in release/*; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
