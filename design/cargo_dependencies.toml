# 语义搜索功能所需的新依赖项

[dependencies]
# 现有依赖保持不变...

# HelixDB相关
helix-db = "0.1.1"  # HelixDB Rust SDK

# 向量化和机器学习
reqwest = { version = "0.11", features = ["json", "stream"] }  # 已存在，确保有json特性

# 异步编程增强
async-trait = "0.1.74"  # 异步trait支持

# 错误处理增强
thiserror = "1.0.50"  # 更好的错误处理

# 配置管理
toml = "0.8.8"  # 已存在，用于配置文件

# 数学计算
nalgebra = { version = "0.32", optional = true }  # 向量计算（可选）

# 缓存
moka = { version = "0.12", features = ["future"] }  # 高性能缓存

# 进程管理
tokio-process = "0.2.5"  # 进程管理增强

# 新增workspace成员
[workspace]
members = [
    "crates/inote",
    "crates/isearch", 
    "crates/aiAssist",
    "crates/itools",
    "crates/iterminal",
    "crates/semantic_search",  # 新增语义搜索模块
]

# 语义搜索模块的Cargo.toml
# 文件路径: crates/semantic_search/Cargo.toml
[package]
name = "semantic_search"
version = "0.1.0"
edition = "2021"
authors = ["SeeU Team"]
description = "Semantic search module with HelixDB integration"

[dependencies]
# 核心依赖
tokio = { version = "1.32.0", features = ["full"] }
async-trait = "0.1.74"
serde = { version = "1.0.188", features = ["derive"] }
serde_json = "1.0.107"
uuid = { version = "1.4.1", features = ["v4", "serde"] }
chrono = { version = "0.4.31", features = ["serde"] }
log = "0.4.20"
anyhow = "1.0.75"
thiserror = "1.0.50"

# HelixDB
helix-db = "0.1.1"

# HTTP客户端
reqwest = { version = "0.11", features = ["json", "stream"] }

# 配置管理
toml = "0.8.8"
dirs = "5.0.1"

# 缓存
moka = { version = "0.12", features = ["future"] }

# 数学计算（可选）
nalgebra = { version = "0.32", optional = true }

# 文件系统
notify = "6.1.1"  # 文件监控

[features]
default = []
math = ["nalgebra"]  # 高级数学计算功能

[dev-dependencies]
tokio-test = "0.4.3"
tempfile = "3.8.1"
